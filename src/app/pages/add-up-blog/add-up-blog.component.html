<div class="header bg-gradient-primary pb-8 pt-5 pt-md-8"></div>

<div class="container-fluid mt--7">
  <div class="row justify-content-center">
    <div class="col-xl-10">
      <div class="card bg-secondary shadow border-0">
        <div class="card-header bg-white border-0">
          <h3 class="mb-0">
            {{
              isEditMode
                ? "Modifier l'article"
                : "Rédaction d'un nouvel article"
            }}
          </h3>
        </div>
        <div class="card-body">
          <form (ngSubmit)="onSubmit()">
            <h6 class="heading-small text-muted mb-4">
              Informations Générales
            </h6>
            <div class="pl-lg-4">
              <div class="row">
                <div class="col-lg-6">
                  <div class="form-group">
                    <label class="form-control-label">Titre</label>
                    <input
                      type="text"
                      name="titre"
                      [(ngModel)]="blogRequest.titre"
                      class="form-control form-control-alternative"
                      placeholder="Titre de l'article"
                    />
                  </div>
                </div>
                <div class="col-lg-6">
                  <div class="form-group">
                    <label class="form-control-label">Catégorie</label>
                    <select
                      name="categorie"
                      [(ngModel)]="blogRequest.categorieId"
                      class="form-control form-control-alternative"
                    >
                      <option value="" disabled>
                        Sélectionner une catégorie
                      </option>
                      <option *ngFor="let cat of categories" [value]="cat.id">
                        {{ cat.nom }}
                      </option>
                    </select>
                  </div>
                </div>
              </div>

              <div class="row">
                <div class="col-lg-6">
                  <div class="form-group">
                    <label class="form-control-label"
                      >Auteur (Nom affiché)</label
                    >
                    <input
                      type="text"
                      name="auteur"
                      [(ngModel)]="blogRequest.auteur"
                      class="form-control form-control-alternative"
                      placeholder="Ex: Tuwindi"
                    />
                  </div>
                </div>
                <!-- <div class="col-lg-6">
                  <div class="form-group">
                    <label class="form-control-label"
                      >Date de Publication</label
                    >
                    <input
                      type="date"
                      name="datePublication"
                      [(ngModel)]="blogRequest.datePublication"
                      class="form-control form-control-alternative"
                    />
                  </div>
                </div> -->
              </div>
            </div>

            <hr class="my-4" />
            <h6 class="heading-small text-muted mb-4">Contenu & Médias</h6>
            <div class="pl-lg-4">
              <div class="form-group">
                <label class="form-control-label"
                  >Description / Corps de l'article</label
                >
                <textarea
                  rows="6"
                  name="description"
                  [(ngModel)]="blogRequest.description"
                  class="form-control form-control-alternative"
                  placeholder="Décrivez votre article ici..."
                ></textarea>
              </div>

              <div class="form-group">
                <label class="form-control-label d-block"
                  >Images d'illustration</label
                >
                <div class="custom-file">
                  <input
                    type="file"
                    class="custom-file-input"
                    id="blogImages"
                    (change)="onFileSelect($event)"
                    multiple
                    accept="image/*"
                  />
                  <label class="custom-file-label" for="blogImages"
                    >Choisir les fichiers</label
                  >
                </div>

                <div class="row mt-3">
                  <div class="col-md-2 col-4 mb-2" *ngFor="let url of previews">
                    <div class="avatar avatar-xl rounded shadow border">
                      <img
                        [src]="url"
                        style="object-fit: cover; width: 100%; height: 100%"
                      />
                    </div>
                  </div>
                </div>
              </div>
            </div>

            <div class="text-right mt-4">
              <button
                type="button"
                class="btn btn-link text-muted"
                [routerLink]="['/liste-blog']"
              >
                Annuler
              </button>
              <button
                type="submit"
                [disabled]="isSubmitting"
                class="btn btn-primary px-5"
              >
                <i class="ni ni-check-bold mr-2"></i>
                {{
                  isSubmitting
                    ? "Envoi..."
                    : isEditMode
                    ? "Enregistrer les modifications"
                    : "Publier l'article"
                }}
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
