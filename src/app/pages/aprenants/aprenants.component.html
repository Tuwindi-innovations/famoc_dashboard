<div class="header bg-gradient-danger pb-8 pt-5 pt-md-8">
  <div class="container-fluid">
    <div class="header-body">
      <h1 class="text-white display-4">
        <i class="bi bi-people-fill me-3"></i>Gestion des Apprenants
      </h1>
      <p class="text-white opacity-8">
        Consultez, modifiez ou gérez les accès des apprenants de la plateforme.
      </p>
    </div>
  </div>
</div>

<div class="container-fluid mt--7">
  <div class="row">
    <div class="col">
      <div class="card shadow border-0">
        <div
          class="card-header border-0 d-flex justify-content-between align-items-center"
        >
          <h3 class="mb-0 text-primary">Liste des inscrits</h3>
          <div class="d-flex gap-2">
            <div class="input-group input-group-alternative input-group-merge">
              <span class="input-group-text"><i class="bi bi-search"></i></span>
              <input
                class="form-control"
                placeholder="Rechercher un nom..."
                type="text"
              />
            </div>
            <button class="btn btn-primary btn-sm px-4">
              <i class="bi bi-person-plus-fill"></i>
            </button>
          </div>
        </div>

        <div class="table-responsive">
          <table class="table align-items-center table-flush">
            <thead class="thead-light">
              <tr>
                <th scope="col">Utilisateur</th>
                <th scope="col">Email</th>
                <th scope="col">Téléphone</th>
                <th scope="col">Rôle</th>
                <th scope="col" class="text-end">Actions</th>
              </tr>
            </thead>
            <tbody>
              <tr *ngFor="let user of apprenants">
                <th scope="row">
                  <div class="d-flex align-items-center">
                    <div class="avatar rounded-circle me-3">
                      <img
                        [src]="
                          user.photoUrl || 'assets/img/theme/default-avatar.png'
                        "
                        alt="Avatar"
                      />
                    </div>
                    <span class="mb-0 text-sm fw-bold text-dark"
                      >{{ user.prenom }} {{ user.nom }}</span
                    >
                  </div>
                </th>
                <td>{{ user.email }}</td>
                <td>{{ user.telephone }}</td>
                <td>
                  <span class="badge badge-dot mr-4">
                    <i class="bg-info"></i>
                    <span class="status">{{ user.role }}</span>
                  </span>
                </td>
                <td class="text-end">
                  <div class="d-flex justify-content-end gap-2">
                    <button
                      class="btn btn-sm btn-outline-primary"
                      (click)="onEdit(user)"
                    >
                      <i class="bi bi-pencil-square"></i>
                    </button>
                    <button
                      class="btn btn-sm btn-outline-danger"
                      (click)="onDelete(user.id)"
                    >
                      <i class="bi bi-trash"></i>
                    </button>
                  </div>
                </td>
              </tr>
            </tbody>
          </table>
        </div>

        <div class="card-footer py-4">
          <nav aria-label="Page navigation">
            <ul class="pagination justify-content-end mb-0">
              <li class="page-item disabled">
                <a class="page-link" href="#"
                  ><i class="bi bi-chevron-left"></i
                ></a>
              </li>
              <li class="page-item active">
                <a class="page-link" href="#">1</a>
              </li>
              <li class="page-item">
                <a class="page-link" href="#"
                  ><i class="bi bi-chevron-right"></i
                ></a>
              </li>
            </ul>
          </nav>
        </div>
      </div>
    </div>
  </div>
</div>
