<div class="header bg-gradient-info pb-8 pt-5 pt-md-8">
  <div class="container-fluid">
    <div class="header-body text-center mb-5">
      <h1 class="text-white">
        <i class="ni ni-hat-3 mr-3"></i>Catalogue des Formations
      </h1>
      <button class="btn btn-neutral btn-sm mt-3" (click)="reload()">
        <i class="fas fa-sync-alt text-info"></i> Actualiser
      </button>

      <button
        class="btn btn-neutral btn-icon shadow"
        [routerLink]="['/add-formation']"
      >
        <span class="btn-inner--icon"
          ><i class="fas fa-plus-circle text-info"></i
        ></span>
        <span class="btn-inner--text text-info font-weight-bold"
          >Ajouter une formation</span
        >
      </button>
    </div>
  </div>
</div>

<div class="container-fluid mt--7">
  <div class="row" *ngIf="!isLoading">
    <div class="col-xl-4 col-lg-6 mb-4" *ngFor="let f of formations">
      <div class="card card-stats shadow border-0 h-100 transition-hover">
        <div
          class="position-relative"
          [routerLink]="['/formations/detail', f.id]"
          style="cursor: pointer"
        >
          <img
            [src]="getImageFullUrl(f.imageUrl)"
            class="card-img-top"
            style="height: 200px; object-fit: cover"
            alt="Formation Image"
          />
          <div class="position-absolute" style="top: 15px; left: 15px">
            <span
              class="badge badge-pill"
              [ngClass]="{
                'badge-success': f.niveau === 'DEBUTANT',
                'badge-warning': f.niveau === 'INTERMEDIAIRE',
                'badge-danger': f.niveau === 'AVANCE'
              }"
            >
              {{ f.niveau }}
            </span>
          </div>
        </div>

        <div class="card-body d-flex flex-column">
          <div class="row">
            <div class="col">
              <h5 class="card-title text-uppercase text-muted mb-0">
                Formation
              </h5>
              <span class="h3 font-weight-bold mb-0 text-info">{{
                f.titre
              }}</span>
            </div>
          </div>

          <p class="mt-3 mb-4 text-sm text-dark flex-grow-1">
            {{ f.description | slice : 0 : 100
            }}{{ f.description.length > 100 ? "..." : "" }}
          </p>

          <div class="border-top pt-3 mt-auto">
            <div class="row">
              <div class="col">
                <small class="text-muted"
                  ><i class="ni ni-time-alarm mr-1"></i> Durée</small
                >
                <span class="d-block font-weight-600 text-sm">
                  {{ f.dureeEstimee }} h
                </span>
              </div>
              <div class="col-auto text-right">
                <div ngbDropdown placement="top-right">
                  <a
                    class="btn btn-sm btn-icon-only text-light"
                    ngbDropdownToggle
                  >
                    <i class="fas fa-ellipsis-v"></i>
                  </a>
                  <div
                    ngbDropdownMenu
                    class="dropdown-menu-right dropdown-menu-arrow"
                  >
                    <!-- <button class="dropdown-item" (click)="editFormation(f)">
                      <i class="ni ni-settings-gear-65 text-primary"></i>
                      Modifier
                    </button> -->
                    <button
                      class="dropdown-item text-danger"
                      (click)="deleteFormation(f.id)"
                    >
                      <i class="ni ni-fat-remove text-danger"></i> Supprimer
                    </button>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div
    *ngIf="!isLoading && formations.length === 0"
    class="alert alert-secondary text-center"
  >
    Aucune formation trouvée.
  </div>
</div>
