<div class="modal-header bg-gradient-primary">
  <h4 class="modal-title text-white">{{ title }}</h4>
  <button
    type="button"
    class="close text-white"
    (click)="activeModal.dismiss()"
  >
    <span>&times;</span>
  </button>
</div>

<div class="modal-body">
  <form [formGroup]="form">
    <div class="form-group mb-3">
      <label class="form-control-label"
        >Titre du {{ type.toLowerCase() }}</label
      >
      <input type="text" class="form-control" formControlName="titre" />
    </div>

    <div *ngIf="type === 'MODULE'">
      <div class="form-group mb-3">
        <label class="form-control-label">Description</label>
        <textarea
          class="form-control"
          rows="3"
          formControlName="description"
        ></textarea>
      </div>
      <div class="form-group mb-3">
        <label class="form-control-label">Durée Estimée (heures)</label>
        <input
          type="number"
          class="form-control"
          formControlName="dureeEstimee"
        />
      </div>
    </div>
    <div *ngIf="type === 'COURS'">
      <div class="form-group mb-3">
        <label class="form-control-label">Format de la leçon</label>
        <select class="form-control" formControlName="typeContenu">
          <option value="TEXTE">📝 Article / Texte</option>
          <option value="VIDEO">🎥 Vidéo (Fichier MP4)</option>
          <option value="PDF">📄 Document PDF</option>
          <option value="PRESENTATION">📊 Présentation / Slides</option>
        </select>
      </div>

      <div
        class="form-group mb-3"
        *ngIf="
          ['VIDEO', 'PDF', 'PRESENTATION'].includes(
            form.get('typeContenu')?.value
          )
        "
      >
        <label class="form-control-label text-info">
          Sélectionner le fichier ({{ form.get("typeContenu")?.value }})
        </label>
        <div class="custom-file">
          <input
            type="file"
            class="form-control border-info"
            (change)="onFileSelected($event)"
            [accept]="
              form.get('typeContenu')?.value === 'VIDEO'
                ? 'video/*'
                : '.pdf,.ppt,.pptx'
            "
          />
          <small class="text-info" *ngIf="selectedFile">
            <i class="fa fa-paperclip"></i> Prêt à l'envoi :
            {{ selectedFile.name }}
          </small>
        </div>
      </div>

      <div class="form-group mb-3">
        <label class="form-control-label">Contenu / Description</label>
        <textarea
          class="form-control"
          rows="3"
          formControlName="contenu"
          [placeholder]="
            form.get('typeContenu')?.value === 'TEXTE'
              ? 'Saisissez votre cours ici...'
              : 'Description optionnelle...'
          "
        ></textarea>
      </div>
    </div>

    <div *ngIf="type === 'QUIZ'">
      <div class="form-group mb-3">
        <label class="form-control-label">Score Minimum pour réussir (%)</label>
        <input
          type="number"
          class="form-control"
          formControlName="scoreMinimun"
        />
      </div>
      <div class="row">
        <div class="col-6">
          <div class="form-group mb-3">
            <label class="form-control-label">Durée (minutes)</label>
            <input type="number" class="form-control" formControlName="duree" />
          </div>
        </div>
        <div class="col-6">
          <div class="form-group mb-3">
            <label class="form-control-label">Nombre de tentatives</label>
            <input
              type="number"
              class="form-control"
              formControlName="nombreTentatives"
            />
          </div>
        </div>
      </div>
    </div>

    <div class="form-group">
      <label class="form-control-label">Ordre d'affichage</label>
      <input type="number" class="form-control" formControlName="ordre" />
    </div>
  </form>
</div>

<div class="modal-footer">
  <button type="button" class="btn btn-link" (click)="activeModal.dismiss()">
    Annuler
  </button>
  <button
    type="button"
    class="btn btn-primary"
    [disabled]="form.invalid"
    (click)="submit()"
  >
    Enregistrer
  </button>
</div>
