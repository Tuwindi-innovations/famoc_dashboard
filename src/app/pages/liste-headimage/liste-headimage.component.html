<div class="header bg-gradient-primary pb-8 pt-5 pt-md-8">
  <div class="container-fluid">
    <div class="header-body text-center mb-5">
      <h1 class="text-white">
        <i class="ni ni-image mr-3"></i>Gestion des Bannières
      </h1>
    </div>
  </div>
</div>

<div class="container-fluid mt--7">
  <div class="row">
    <div class="col-xl-4 mb-5">
      <div class="card shadow border-0">
        <div class="card-header bg-white">
          <h3 class="mb-0">
            {{ isEdit ? "Modifier la bannière" : "Nouvelle bannière" }}
          </h3>
        </div>
        <div class="card-body bg-secondary">
          <form (ngSubmit)="onSubmit()">
            <div class="form-group">
              <label class="form-control-label">Nom de la page</label>
              <input
                type="text"
                [(ngModel)]="form.pageName"
                name="pageName"
                class="form-control"
                [disabled]="isEdit"
              />
            </div>
            <div class="form-group">
              <label class="form-control-label">Description / Slogan</label>
              <textarea
                [(ngModel)]="form.description"
                name="description"
                rows="2"
                class="form-control"
              ></textarea>
            </div>
            <div class="form-group">
              <label class="form-control-label">Fichier Image</label>
              <div class="custom-file">
                <input
                  type="file"
                  (change)="onFileSelected($event)"
                  class="custom-file-input"
                  id="customFile"
                />
                <label class="custom-file-label" for="customFile">{{
                  fileName || "Choisir une image..."
                }}</label>
              </div>
            </div>
            <button type="submit" class="btn btn-primary mt-4 w-100">
              {{ isEdit ? "Mettre à jour" : "Enregistrer" }}
            </button>
            <button
              *ngIf="isEdit"
              type="button"
              (click)="resetForm()"
              class="btn btn-link text-muted mt-2 w-100"
            >
              Annuler
            </button>
          </form>
        </div>
      </div>
    </div>

    <div class="col-xl-8">
      <div class="row" *ngIf="headImages.length > 0; else noData">
        <div class="col-md-6 mb-4" *ngFor="let head of headImages">
          <div class="card card-stats shadow border-0 overflow-hidden">
            <div class="position-relative">
              <img
                [src]="'http://localhost:7070/api/v1/' + head.image"
                class="card-img-top"
                style="height: 180px; object-fit: cover"
              />
              <div class="position-absolute" style="top: 10px; right: 10px">
                <span class="badge badge-primary">{{ head.pageName }}</span>
              </div>
            </div>
            <div class="card-body">
              <p class="text-sm text-muted mb-3">{{ head.description }}</p>
              <div class="d-flex justify-content-between border-top pt-3">
                <button
                  (click)="prepareEdit(head)"
                  class="btn btn-sm btn-outline-info"
                >
                  <i class="fas fa-edit"></i> Modifier
                </button>
                <button
                  (click)="onDelete(head.idHeadImage)"
                  class="btn btn-sm btn-outline-danger"
                >
                  <i class="fas fa-trash"></i> Supprimer
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>

      <ng-template #noData>
        <div class="card bg-secondary shadow border-0 text-center p-5">
          <h3 class="text-muted">Aucune bannière trouvée</h3>
          <p>Les images s'afficheront ici une fois créées.</p>
        </div>
      </ng-template>
    </div>
  </div>
</div>
